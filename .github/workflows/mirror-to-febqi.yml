name: Mirror to febqi/lab-hp

on:
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check token
        run: |
          if [ -z "${{ secrets.FEBQI_TOKEN }}" ]; then
            echo "ERROR: FEBQI_TOKEN is empty"
          else
            echo "FEBQI_TOKEN is set (length: ${#TOKEN} chars)"
          fi
        env:
          TOKEN: ${{ secrets.FEBQI_TOKEN }}

      - name: Push to febqi/lab-hp
        run: |
          git remote add febqi https://x-access-token:${{ secrets.FEBQI_TOKEN }}@github.com/febqi/lab-hp.git
          git push febqi main 2>&1
